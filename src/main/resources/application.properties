spring.application.name=exam-system

# MySQL database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/test}
spring.datasource.username=${DB_USERNAME:test}
spring.datasource.password=${DB_PASSWORD:test}

spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT Configuration
secret=${JWT_SECRET}
expiration=${JWT_EXPIRATION}
jwt.refresh-token.expiration-minutes=${JWT_REFRESH_EXPIRATION_MINUTES}


# server port configuration
server.port=7860


# QR Code Configuration
exam.qr.expiration-minutes=2


# Email Configuration (Brevo SMTP)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
mail.from=${MAIL_FROM}
spring.mail.username=${BREVO_USERNAME:test@example.com}
spring.mail.password=${BREVO_API_KEY:testpassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


# other 
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.org.hibernate.SQL=error
spring.thymeleaf.check-template-location=false

# Actuator security - only expose safe endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.env.enabled=false
management.endpoint.heapdump.enabled=false
management.endpoint.configprops.enabled=false

# Swagger UI - DISABLE in production with springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}


# \u062A\u0639\u0637\u064A\u0644 \u0635\u0641\u062D\u0629 Swagger \u0627\u0644\u0631\u0626\u064A\u0633\u064A\u0629
springdoc.swagger-ui.disable-swagger-default-url=true
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# \u062A\u0643\u0648\u064A\u0646 \u0648\u0627\u062C\u0647\u0629 \u0627\u0644\u0645\u0633\u062A\u062E\u062F\u0645
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha


# Cloudinary Config
Cloudname=${CLOUDINARY_NAME}
APIKey=${CLOUDINARY_API_KEY}
APISecret=${CLOUDINARY_API_SECRET}
CLOUDINARY_URL=${CLOUDINARY_URL}

# ===============================
# RabbitMQ Connection
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
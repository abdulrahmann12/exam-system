spring.application.name=exam-system

# MySQL database configuration

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/exam_v1}
spring.datasource.username=${DB_USERNAME:springstudent}
spring.datasource.password=${DB_PASSWORD:springstudent}

spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# JWT Configuration
secret=${JWT_SECRET:REPLACE_WITH_SECURE_SECRET}
expiration=900000
jwt.refresh-token.expiration-minutes=43200


# QR Code Configuration
exam.qr.expiration-minutes=2


# Email Configuration (Mailtrap)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:REPLACE_WITH_MAIL_USER}
spring.mail.password=${MAIL_PASSWORD:REPLACE_WITH_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true



# other 
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.org.hibernate.SQL=error
spring.thymeleaf.check-template-location=false


# \u062A\u063A\u064A\u064A\u0631 \u0645\u0633\u0627\u0631 Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# \u062A\u0639\u0637\u064A\u0644 \u0635\u0641\u062D\u0629 Swagger \u0627\u0644\u0631\u0626\u064A\u0633\u064A\u0629
springdoc.swagger-ui.disable-swagger-default-url=true
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# \u062A\u0643\u0648\u064A\u0646 \u0648\u0627\u062C\u0647\u0629 \u0627\u0644\u0645\u0633\u062A\u062E\u062F\u0645
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha


# Cloudinary Config
Cloudname=${CLOUDINARY_NAME:REPLACE_WITH_CLOUDINARY_NAME}
APIKey=${CLOUDINARY_API_KEY:REPLACE_WITH_CLOUDINARY_KEY}
APISecret=${CLOUDINARY_API_SECRET:REPLACE_WITH_CLOUDINARY_SECRET}
CLOUDINARY_URL=${CLOUDINARY_URL:cloudinary://<your_api_key>:<your_api_secret>@djhbgtqbg}


# ===============================
# RabbitMQ Connection
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:exam}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:exam}
spring.rabbitmq.virtual-host=/


